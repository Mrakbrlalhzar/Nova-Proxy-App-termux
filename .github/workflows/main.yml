name: Build NovaProxy Core for Termux (Android 8 armv7)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Hard Fix go.mod (Text-based Cleanup)
        run: |
          sed -i '/[a-zA-Z]:\\/d' go.mod
          sed -i '/=>.*[a-zA-Z]:/d' go.mod
          sed -i '64d' go.mod || true
          go mod edit -dropreplace github.com/refraction-networking/utls || true
          sed -i '/=>.*\.\//d' go.mod
          go mod tidy

      - name: Patch Windows-Specific Code inside Packages
        run: |
          # ۱. پچ کردن توابع ویندوزی در cert/cert.go
          cat << 'EOF' >> cert/cert.go

          // Linux compatibility patches by GitHub Actions Workflow
          func outputHiddenCommand(name string, arg ...string) ([]byte, error) { return nil, nil }
          func runHiddenCommand(name string, arg ...string) error { return nil }
          func runElevatedCommand(name string, arg ...string) error { return nil }
          func startVisibleCommand(name string, arg ...string) error { return nil }
          EOF

          # ۲. حل مشکل تابع hideWindow در cert/installer.go
          sed -i 's/hideWindow/func(cmd interface{}){}(nil) \/\/ hideWindow/g' cert/installer.go

          # ۳. غیرفعال کردن کدهای ویندوزی port_manager.go برای لینوکس
          echo -e "// +build !windows\n\npackage proxy" > proxy/port_manager.go
          cat << 'EOF' >> proxy/port_manager.go
          import "net"
          func checkPortAndKill(port string) {}
          func isPortOpen(port string) bool {
              ln, err := net.Listen("tcp", ":"+port)
              if err != nil { return false }
              ln.Close()
              return true
          }
          EOF

          # ۴. پچ کردن ارور شبکه ویندوز WSAECONNRESET در proxy/error_page.go
          sed -i 's/syscall.WSAECONNRESET/syscall.ECONNRESET/g' proxy/error_page.go

      - name: Create Linux Mock Files for Root Project
        run: |
          # ساخت پچ برای توابع گمشده ویندوزی در ریشه پروژه (برای محیط لینوکس/ترموکس)
          
          cat << 'EOF' > core_patches_linux.go
          package main

          import "io"

          // شبیه‌سازی متغیرها و توابع ویندوزی که کامپایلر لینوکس نیاز دارد
          var externalMihomoManager interface{} = nil
          var ringLogWriter io.Writer = io.Discard
          var markerDetail string = ""

          func isProcessElevated() bool {
              // در لینوکس/ترموکس دسترسی ادمین (روت) با چک کردن UID مشخص میشه، فعلا فرض رو بر معمولی می‌ذاریم
              return false
          }

          func writeCoreMarker(detail string) {
              // تابع مارکر نویسی هسته که روی لینوکس نیازی بهش نیست
          }
          EOF

      - name: Compile Optimized Core for Termux (Android 8 / ARMv7)
        run: |
          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          
          # بیلد نهایی پروژه شامل فایل پچ جدید
          go build -o novaproxy-termux-armv7 -ldflags="-s -w" .

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaproxy-termux-armv7
          path: novaproxy-termux-armv7
