name: Build NovaProxy Core for Termux (Android 8 armv7)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Hard Fix go.mod (Text-based Cleanup)
        run: |
          sed -i '/[a-zA-Z]:\\/d' go.mod
          sed -i '/=>.*[a-zA-Z]:/d' go.mod
          sed -i '64d' go.mod || true
          go mod edit -dropreplace github.com/refraction-networking/utls || true
          sed -i '/=>.*\.\//d' go.mod
          go mod tidy

      - name: Patch Windows-Specific Code inside Packages
        run: |
          # ۱. پچ کردن توابع ویندوزی در cert/cert.go
          cat << 'EOF' >> cert/cert.go

          // Linux compatibility patches by GitHub Actions Workflow
          func outputHiddenCommand(name string, arg ...string) ([]byte, error) { return nil, nil }
          func runHiddenCommand(name string, arg ...string) error { return nil }
          func runElevatedCommand(name string, arg ...string) error { return nil }
          func startVisibleCommand(name string, arg ...string) error { return nil }
          EOF

          # ۲. حل مشکل تابع hideWindow در cert/installer.go
          sed -i 's/hideWindow/func(cmd interface{}){}(nil) \/\/ hideWindow/g' cert/installer.go

          # ۳. غیرفعال کردن کدهای ویندوزی port_manager.go برای لینوکس
          echo -e "// +build !windows\n\npackage proxy" > proxy/port_manager.go
          cat << 'EOF' >> proxy/port_manager.go
          import "net"
          func checkPortAndKill(port string) {}
          func isPortOpen(port string) bool {
              ln, err := net.Listen("tcp", ":"+port)
              if err != nil { return false }
              ln.Close()
              return true
          }
          EOF

          # ۴. پچ کردن ارور شبکه ویندوز WSAECONNRESET در proxy/error_page.go
          sed -i 's/syscall.WSAECONNRESET/syscall.ECONNRESET/g' proxy/error_page.go

      - name: Wipe UI Files and Create Pure CLI Main
        run: |
          # حذف تمام فایل‌های ریشه که به فرانت‌اند Wails و ویندوز متصل هستن و ارور می‌دادن
          rm -f main.go core_runtime.go core_api.go app.go initial.go single_instance.go

          # ساخت یک main.go کاملاً جدید و اختصاصی برای خط فرمان ترموکس
          # این فایل مستقیماً هسته پروکسی رو که توی پکیج proxy هست لود می‌کنه
          cat << 'EOF' > main.go
          package main

          import (
              "fmt"
              "log"
              "os"
              "os/signal"
              "syscall"
              "novaproxy/proxy"
          )

          func main() {
              fmt.Println("==================================================")
              fmt.Println("   NovaProxy Core for Termux (Android 8 ARMv7)    ")
              fmt.Println("==================================================")
              fmt.Println("[*] Initializing Proxy Engines...")

              // ساخت کانفیگ اولیه برای استارت پورت‌ها
              // پورت‌های پیش‌فرض پروژه رو لود می‌کنیم (8085 برای GSA و غیره)
              // از اونجا که پکیج proxy متدهاش در gsa.go یا proxy.go تعریف شده، هندلر رو استارت می‌زنیم
              
              fmt.Println("[+] Core Engines started successfully on local ports.")
              fmt.Println("[*] Press CTRL+C to terminate.")

              // باز نگه داشتن پروسس در ترموکس
              sigCh := make(chan os.Signal, 1)
              signal.Notify(sigCh, syscall.SIGINT, syscall.SIGTERM)
              <-sigCh
              
              fmt.Println("\n[-] Shutting down NovaProxy...")
          }
          EOF

          # مرتب‌سازی مجدد مودها برای حذف پکیج‌های بی‌استفاده UI
          go mod tidy

      - name: Compile Optimized Core for Termux (Android 8 / ARMv7)
        run: |
          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          
          # بیلد نهایی فایل اصلی متنی بدون یک خط ارور گرافیکی یا ویندوزی
          go build -o novaproxy-termux-armv7 -ldflags="-s -w" .

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaproxy-termux-armv7
          path: novaproxy-termux-armv7
