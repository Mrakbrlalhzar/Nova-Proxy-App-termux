name: Build NovaProxy Core for Termux (Android 8 armv7)

on:
  workflow_dispatch: # اجرای دستی از تب Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true # فعال‌سازی کش برای افزایش سرعت بیلد

      - name: Fix and Clean go.mod (Remove Windows Paths)
        run: |
          # حذف خطوطی که شامل مسیرهای لوکال ویندوزی (مثل C:\ یا D:\) هستند
          sed -i '/=>.*[a-zA-Z]:/d' go.mod
          
          # اطمینان از پاک شدن خط 64 که در بیلد قبلی تداخل ایجاد کرده بود
          sed -i '64d' go.mod || true
          
          # سینک کردن و دانلود مجدد پکیج‌های استاندارد از اینترنت
          go mod tidy

      - name: Compile Optimized Core for Termux (Android 8 / ARMv7)
        run: |
          # CGO_ENABLED=0: بیلد کاملاً مستقل (Statically Linked) بدون نیاز به لایبرری‌های سیستم‌عامل
          # GOOS=linux: سازگار با ساختار هسته اندروید و لینوکس ترموکس
          # GOARCH=arm & GOARM=7: تنظیم دقیق معماری برای پردازنده‌های 32 بیتی armv7
          # -ldflags="-s -w": حذف کامنت‌ها و دیتای دیباگ جهت کاهش حجم فایل و بهینه‌سازی مصرف رم گوشی
          
          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          
          go build -o novaproxy-termux-armv7 -ldflags="-s -w" .

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaproxy-termux-armv7
          path: novaproxy-termux-armv7
