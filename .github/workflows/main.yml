name: Build NovaProxy Core for Termux (Android 8 armv7)

on:
  workflow_dispatch: # اجرای دستی از تب Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true # فعال‌سازی کش برای افزایش سرعت بیلد

      - name: Hard Fix go.mod (Text-based Cleanup)
        run: |
          # ۱. اول به صورت متنی تمام خطوطی که مسیرهای ویندوزی دارن (مثل C:\ یا D:\) رو کاملاً حذف کن
          sed -i '/[a-zA-Z]:\\/d' go.mod
          sed -i '/=>.*[a-zA-Z]:/d' go.mod
          
          # ۲. خط ۶۴ رو هم برای اطمینان مجدد به صورت دستی پاک کن
          sed -i '64d' go.mod || true
          
          # ۳. حالا که فایل متنی تمیز شد و ابزار go دیگه کرش نمی‌کنه، رپلیسمنت utls رو حذف کن
          go mod edit -dropreplace github.com/refraction-networking/utls || true
          
          # ۴. هر رپلیسمنت دیگه‌ای که به فولدرهای لوکال اشاره می‌کنه رو هم پاک کن
          sed -i '/=>.*\.\//d' go.mod
          
          # ۵. در نهایت پکیج‌های رسمی رو از اینترنت دانلود و فایل رو مرتب کن
          go mod tidy

      - name: Compile Optimized Core for Termux (Android 8 / ARMv7)
        run: |
          # تنظیم معماری ۳۲ بیتی برای اندروید ۸ ترموکس
          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          
          # بیلد و بهینه‌سازی حجم فایل
          go build -o novaproxy-termux-armv7 -ldflags="-s -w" .

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaproxy-termux-armv7
          path: novaproxy-termux-armv7
