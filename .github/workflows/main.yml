name: Build NovaProxy Core for Termux (Android 8 armv7)

on:
  workflow_dispatch: # اجرای دستی از تب Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true # فعال‌سازی کش برای افزایش سرعت بیلد

      - name: Fix and Clean go.mod (Drop Local Replacements)
        run: |
          # حذف رپلیسمنت‌های محلی که به فولدرهای ناموجود اشاره می‌کنن (مثل ./utls)
          go mod edit -dropreplace github.com/refraction-networking/utls
          
          # حذف بقیه هدرهای رپلیسمنت محلی احتمالی و مسیرهای لوکال ویندوزی
          sed -i '/=>.*[a-zA-Z]:/d' go.mod
          sed -i '/=>.*\.\//d' go.mod
          
          # سینک کردن و دانلود مجدد پکیج‌های استاندارد و رسمی از اینترنت
          go mod tidy

      - name: Compile Optimized Core for Termux (Android 8 / ARMv7)
        run: |
          # تنظیم دقیق معماری برای پردازنده‌های 32 بیتی armv7 و اندروید 8
          export CGO_ENABLED=0
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          
          # بیلد نهایی پروژه با حذف اطلاعات دیباگ برای بهینه‌سازی رم و حجم
          go build -o novaproxy-termux-armv7 -ldflags="-s -w" .

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaproxy-termux-armv7
          path: novaproxy-termux-armv7
